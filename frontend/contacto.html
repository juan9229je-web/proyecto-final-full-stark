<body>
    
    <div class="agrupar">
      <header class="cabecera d-flex align-items-center justify-content-between p-3">
        <h1 class="m-0">TecnoHogar</h1>
        
        <nav class="menu">
          <ul class="d-flex m-0 p-0" style="list-style: none; gap: 15px;">

          </ul>
        </nav>
      </header>

      <section class="seccion">
    <article>

        <h2 class="text-center mb-4">Contáctanos</h2>

        <div class="container">
            <div class="row">

                <!-- FORMULARIO -->
                <div class="col-md-6 mb-4">

                    <h4>Envíanos un mensaje</h4>

                    <form id="formulario">

                        <label>Nombre</label>
                        <input type="text" id="nombre" class="form-control mb-2">

                        <label>Correo</label>
                        <input type="email" id="correo" class="form-control mb-2">

                        <label>Teléfono</label>
                        <input type="number" id="telefono" class="form-control mb-2">

                        <label>Mensaje</label>
                        <textarea id="mensaje" class="form-control mb-3"></textarea>

                        <button type="submit" class="btn btn-primary w-100">
                            Enviar mensaje
                        </button>

                    </form>

                    <p id="respuesta" class="mt-3"></p>

                </div>

                <!-- INFO CONTACTO -->
                <div class="col-md-6">

                    <h4>Información de soporte</h4>

                    <div class="card shadow">
                        <div class="card-body">

                            <p><strong> Correo:</strong> contacto@tecnohogar.com</p>
                            <p><strong> Teléfono:</strong> 300 123 4567</p>
                            <p><strong> Ciudad:</strong> Medellín, Colombia</p>
                            <p><strong> Horario:</strong> Lunes a viernes 8:00 AM - 6:00 PM</p>

                        </div>
                    </div>

                </div>

            </div>
        </div>

    </article>
</section>

        <footer class="pie">
            Página de contacto
