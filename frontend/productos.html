    <link rel="stylesheet" href="css/estilos.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <div class="agrupar">
      <header class="cabecera d-flex align-items-center justify-content-between p-3">
        <h1 class="m-0">TecnoHogar</h1>
        
        <nav class="menu">
          <ul class="d-flex m-0 p-0" style="list-style: none; gap: 15px;">
            <li><a href="index.html" class="text-white text-decoration-none">Inicio</a></li>
            <li><a href="ayuda.html" class="text-white text-decoration-none">Ayuda</a></li>
            <li><a href="contacto.html" class="text-white text-decoration-none">Contacto</a></li>
            <li><a href="productos.html" class="text-white text-decoration-none">Productos</a></li>
            <li><a href="login.html" class="text-white text-decoration-none">iniciar sesión</a></li>
          </ul>
        </nav>
      </header>

      <section class="seccion">
        <article>
            <h2>Catálogo de Productos</h2>
            <p>Encuentra los mejores equipos tecnológicos y accesorios para tu hogar.</p>

            <div id="lista-productos" class="row">
                <!-- Aquí se mostrarán los productos -->
            </div>

        </article>
    </section>
    <footer class="pie">
        © 2026 TecnoHogar - Todos los derechos reservados
    </footer>
   </div>

    <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-dark text-white">
            <h5 class="modal-title" id="modalProductoNombre">Nombre del Producto</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img id="modalProductoImagen" src="" alt="" class="img-fluid rounded mb-3" style="max-height: 250px; object-fit: contain;">
            <p id="modalProductoDescripcion" class="text-muted"></p>
            <hr>
            <div class="d-flex justify-content-around fw-bold">
              <p class="text-primary">Precio: $<span id="modalProductoPrecio">0</span></p>
              <p class="text-success">Categoría: <span id="modalProductoCategoria">N/A</span></p>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
          </div>
        </div>
      </div>
    </div>
    <script src="js/productos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
